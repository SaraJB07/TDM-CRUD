<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="index-page">

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Gestion</a></li>
            <li><a href="catalog.html">Catalogo</a></li>
        </ul>
    </nav>

    <main class="page-shell">
        <h1>Gestion de Items</h1>

        <form id="itemForm" novalidate>
            <div class="form-grid">
                <input
                    type="text"
                    id="name"
                    placeholder="Nombre del item"
                    required
                >

                <input
                    type="text"
                    id="category"
                    placeholder="Categoria"
                    required
                >

                <input
                    type="text"
                    id="material"
                    placeholder="Material"
                    required
                >

                <input
                    type="text"
                    id="price"
                    placeholder="Precio"
                    required
                >

                <input
                    type="text"
                    id="stock"
                    placeholder="Stock"
                    required
                >

                <input
                    type="text"
                    id="image"
                    placeholder="Link de imagen"
                    required
                >

                <textarea
                    id="description"
                    placeholder="Descripcion del producto"
                    required
                ></textarea>
            </div>

            <button type="submit" id="submitBtn">Agregar</button>
        </form>

        <div id="mensajito"></div>

        <section class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripcion</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoria</th>
                        <th>Material</th>
                        <th>Imagen</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="itemsTable"></tbody>
            </table>
        </section>
    </main>

    <script type="module" src="./js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
