<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <nav class="navbar">
        <ul>
            <li><a href="index.html">Gestión</a></li>
            <li><a href="catalog.html">Catálogo</a></li>
        </ul>
    </nav>

    <h1>Gestión de Items</h1>

    <form id="itemForm" novalidate>

        <input 
            type="text" 
            id="name" 
            placeholder="Nombre del item" 
            required
        >

        <input 
            type="text" 
            id="description" 
            placeholder="Descripción"
            required
        >
        <input 
             type="text" 
             id="price" 
             placeholder="Precio" 
             required
             oninput="this.value=this.value.replace(/[^0-9.]/g,'')"
>

        <input 
            type="text" 
            id="stock" 
            placeholder="Stock" 
            required
            oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        >

        <input 
            type="text" 
            id="material" 
            placeholder="Material"
            required
            oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g,'')"
        >

        <input 
            type="text" 
            id="category" 
            placeholder="Categoría"
            required
            oninput="this.value=this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g,'')"
        >

        <button type="submit" id="submitBtn">Agregar</button>

    </form>

    <div id="mensajito"></div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Material</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="itemsTable"></tbody>
    </table>

    <script type="module" src="./js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>
</html>
