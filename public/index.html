<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Items</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="index-page">

    <nav class="navbar" aria-label="Navegacion principal">
        <div class="navbar-inner">
            <a class="navbar-brand" href="index.html">MUNDO JOYAS</a>
            <ul class="navbar-menu">
                <li><a class="navbar-link is-active" href="index.html">Gestión</a></li>
                <li><a class="navbar-link" href="catalog.html">Catálogo</a></li>
            </ul>
        </div>
    </nav>

    <main class="page-shell">
        <h1>Gestión de Items</h1>

        <form id="itemForm" novalidate>
            <div class="form-grid">
                <input type="text" id="name" placeholder="Nombre del item" required>
                <input type="text" id="category" placeholder="Categoría" required>
                <input type="text" id="material" placeholder="Material" required>
                <input type="text" id="price" placeholder="Precio" required>
                <input type="text" id="stock" placeholder="Stock" required>
                <input type="text" id="image" placeholder="Link de imagen" required>
                <textarea id="description" placeholder="Descripción del producto" required></textarea>
            </div>
            <button type="submit" id="submitBtn">Agregar</button>
        </form>

        <div id="mensajito"></div>

        <section class="table-shell">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Material</th>
                        <th>Imagen</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="itemsTable"></tbody>
            </table>
        </section>
    </main>

    <!-- modal de confirmación personalizado para mensaje, titulo e icono -->

    <dialog id="customConfirm" class="mi-popup-modal">
        <div class="modal-body">
            <div id="modalIcon" class="modal-icon">?</div>
            <h2 id="modalTitle" class="titulo-alerta"></h2>
            <p id="modalMessage" class="texto-alerta"></p>
            <div class="modal-buttons">
                <!-- Botón para confirmar la acción  -->
                <button id="confirmBtn" class="btn-confirmar">Confirmar</button>
                <!-- Botón para cancelar la acción -->
                <button id="cancelBtn" class="btn-cancelar-modal">Cancelar</button>
            </div>
        </div>
    </dialog>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
